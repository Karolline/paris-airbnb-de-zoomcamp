name: Workflow for paris-airbnb-de-zoomcamp

on:
  # push:
    # branches:
    #   - main
  workflow_dispatch:
  
jobs:
  ingest-transform-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: List dbt packages
        run: |
          echo "Checking installed dbt packages..."
          pip list | grep dbt

      - name: Download data from Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          kaggle datasets download -d mysarahmadbhat/airbnb-listings-reviews
          ls
          # python scripts/ingest.py