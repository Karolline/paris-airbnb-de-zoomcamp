name: Workflow for paris-airbnb-de-zoomcamp

on:
  # push:
    # branches:
    #   - main
  workflow_dispatch:
  
jobs:
  ingest-transform-data:
    runs-on: ubuntu-latest
    env:
      TF_VAR_project_id: "paris-airbnb-de-zoomcamp"
      TF_VAR_gcs_bucket_name: "datalake-paris-airbnb-de-zoomcamp"

    steps:
    # 1. Settings for Environment
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # ---------------------------------------------------------
      # GCP AUTHENTICATION SECTION
      # --------------------------------------------------------- 
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      # ---------------------------------------------------------

      # ---------------------------------------------------------
      # TERRAFORM SECTION
      # ---------------------------------------------------------

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform -chdir=terraform init

        # drop datasets that cannot be destroyed due to existing native tables
      - name: Pre-clean BigQuery Datasets
        run: |
          bq rm -f -r -d ${{ env.TF_VAR_project_id }}:raw
          bq rm -f -r -d ${{ env.TF_VAR_project_id }}:staging
          bq rm -f -r -d ${{ env.TF_VAR_project_id }}:marts

      - name: Verify GCP Authentication
        run: |
          bq ls --project_id ${{ env.TF_VAR_project_id }}

      - name: Terraform Apply
        run: terraform -chdir=terraform apply -auto-approve
      # ---------------------------------------------------------

    # 2.Ingest Data
      - name: Create Kaggle Config File
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Download data from Kaggle and upload to GCS
        run: |
          python scripts/ingest.py

    # 3.Run dbt for Transformation
      - name: Install dbt and Dependencies
        run: dbt deps --project-dir paris_airbnb_dbt

      - name: Stage External Sources
        run: |
          dbt run-operation stage_external_sources \
          --project-dir paris_airbnb_dbt \
          --profiles-dir paris_airbnb_dbt

      - name: Execute dbt Models
        run: |
          dbt run \
          --project-dir paris_airbnb_dbt \
          --profiles-dir paris_airbnb_dbt
      # ---------------------------------------------------------

    # 4.Refresh Dashboard

    # 5.Destroy reousrces
      # - name: Terraform Destroy
      #   run: terraform -chdir=terraform destroy -auto-approve
